<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Night Credits Output</title>
    <style>
    :root {
        --text: #FFFFFF;
        --muted: #CCCCCC;
        --accent: #0066CC;
        --blue: #0059B3
    }

    * {
        box-sizing: border-box
    }

    body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: transparent;
        color: var(--text);
        font-family: "Trebuchet MS", Verdana, Arial, sans-serif;
        text-shadow:
            -1px -1px 0 #000,
             1px -1px 0 #000,
            -1px  1px 0 #000,
             1px  1px 0 #000
    }

    .stage {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: transparent;
        box-shadow: none
    }

    .standby {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .12em
    }

    .standby strong {
        display: block;
        margin-bottom: .75rem;
        color: var(--accent);
        font-size: clamp(1.5rem, 4vw, 3.5rem);
        text-shadow:
            0 0 14px rgba(255, 207, 112, .28),
            -1px -1px 0 #000,
             1px -1px 0 #000,
            -1px  1px 0 #000,
             1px  1px 0 #000
    }

    .roll {
        position: absolute;
        left: 0;
        width: 100%;
        padding: 0 1rem 7rem;
        text-align: center;
        text-shadow:
            -1px -1px 0 #000,
             1px -1px 0 #000,
            -1px  1px 0 #000,
             1px  1px 0 #000,
            0 0 10px rgba(255, 242, 210, .34)
    }

    .roll.ready {
        top: 2rem;
        max-height: calc(100vh - 4rem);
        overflow: hidden
    }

    .roll.playing {
        top: 100%;
        animation-name: rollUp;
        animation-timing-function: linear;
        animation-fill-mode: forwards
    }

    @keyframes rollUp {
        from {
            transform:translateY(0)
        }

        to {
            transform: translateY(calc(-100% - 100vh))
        }
    }

    .show-title {
        margin: 0 0 1rem;
        font-size: clamp(2.2rem, 6vw, 6rem);
        line-height: 1.02;
        text-transform: uppercase;
        letter-spacing: .08em
    }

    .subtitle {
        margin: 0 0 5rem;
        font-size: clamp(1.2rem, 2.2vw, 2rem);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .14em
    }

    .section-heading {
        margin: 5rem 0 2.75rem;
        font-size: clamp(1.15rem, 2.5vw, 2.35rem);
        color: var(--accent);
        letter-spacing: .12em;
        text-transform: uppercase
    }

    .credit-entry {
        margin: 0 0 2.45rem
    }

    .credit-name {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.8rem, 3.9vw, 3.6rem);
        line-height: 1.08;
        text-transform: uppercase;
        letter-spacing: .04em
    }

    .credit-title {
        margin-top: .35rem;
        color: var(--muted);
        font-size: clamp(1rem, 1.9vw, 1.55rem);
        line-height: 1.35
    }

    /* In-roll version: same visual style, natural flow */
    .final-card {
        margin: 6rem auto 1rem;
        width: min(780px, 92%);
        color: var(--blue);
        font-size: clamp(1.25rem, 2.8vw, 2.45rem);
        line-height: 1.35;
        text-transform: uppercase;
        letter-spacing: .09em
    }

    /* Fixed overlay version that "catches" the card at center */
    .final-card-fixed {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(780px, 92%);
        color: var(--blue);
        font-size: clamp(1.25rem, 2.8vw, 2.45rem);
        line-height: 1.35;
        text-transform: uppercase;
        letter-spacing: .09em;
        text-align: center;
        text-shadow:
            -1px -1px 0 #000,
             1px -1px 0 #000,
            -1px  1px 0 #000,
             1px  1px 0 #000;
        z-index: 10;
        pointer-events: none
    }
    </style>
</head>
<body>
    <main class="stage">
        <div id="standby" class="standby">
            <div>
                <strong>Great Night Credits</strong>
                Waiting for credits from the control page
            </div>
        </div>
        <div id="roll" class="roll ready" aria-live="polite"></div>
        <div id="final-card-fixed" class="final-card-fixed">
            No chatters were harmed<br>
            in the making of this livestream<br>
            &lt;&gt;
        </div>
    </main>
    <script>
    const roll = document.getElementById("roll");
    const standby = document.getElementById("standby");
    const finalCardFixed = document.getElementById("final-card-fixed");
    let lastCommandAt = 0;
    let trackingRaf = null;

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, m => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
        }[m]))
    }
    function splitForSections(participants) {
        const specialCount = Math.min(8, Math.ceil(participants.length * 0.28));
        return {
            specialThanks: participants.slice(0, specialCount),
            chatRogues: participants.slice(specialCount)
        }
    }
    function entry(p) {
        return `<div class="credit-entry"><div class="credit-name">${escapeHtml(p.name)}</div><div class="credit-title">${escapeHtml(p.title || '')}</div></div>`
    }
    function render(payload) {
        const participants = Array.isArray(payload.participants) ? payload.participants : [];
        if (participants.length === 0) {
            standby.style.display = "grid";
            roll.innerHTML = "";
            return;
        }
        standby.style.display = "none";
        const sections = splitForSections(participants);
        roll.innerHTML = `<h1 class="show-title">Great Night Chatrelm</h1><p class="subtitle">Today's Chat Credits</p><div class="section-heading">Special Thanks To</div>${sections.specialThanks.map(entry).join("")}<div class="section-heading">Chatrelm Members</div>${sections.chatRogues.map(entry).join("")}<div id="final-card-scroll" class="final-card">No chatters were harmed<br>in the making of this livestream<br>&lt;&gt;</div>`;
    }
    function trackFinalCard() {
        if (trackingRaf) cancelAnimationFrame(trackingRaf);
        finalCardFixed.style.display = "none";

        function check() {
            const scrollCard = document.getElementById("final-card-scroll");
            if (!scrollCard) return;

            const rect = scrollCard.getBoundingClientRect();
            const targetTop = (window.innerHeight - rect.height) / 2;

            if (rect.top <= targetTop) {
                // Card has reached center — hand off to the fixed overlay
                finalCardFixed.style.display = "block";
                scrollCard.style.visibility = "hidden";
                return;
            }
            trackingRaf = requestAnimationFrame(check);
        }
        trackingRaf = requestAnimationFrame(check);
    }
    function preview(payload) {
        if (trackingRaf) cancelAnimationFrame(trackingRaf);
        finalCardFixed.style.display = "none";
        render(payload);
        roll.className = "roll ready";
        roll.style.animationDuration = "";
    }
    function start(payload) {
        render(payload);
        roll.className = "roll playing";
        roll.style.animationDuration = `${payload.duration || 70}s`;
        roll.style.animationName = "none";
        roll.offsetHeight;
        roll.style.animationName = "";
        trackFinalCard();
    }
    function reset(payload) {
        preview(payload);
    }
    function handlePayload(payload) {
        if (!payload || payload.updatedAt <= lastCommandAt)
            return;
        lastCommandAt = payload.updatedAt;
        if (payload.action === "clear") {
            if (trackingRaf) cancelAnimationFrame(trackingRaf);
            finalCardFixed.style.display = "none";
            standby.style.display = "grid";
            roll.innerHTML = "";
            return;
        }
        if (payload.action === "start")
            start(payload);
        else if (payload.action === "reset")
            reset(payload);
        else
            preview(payload);
    }
    async function poll() {
        try {
            const r = await fetch('/api/command', {
                cache: 'no-store'
            });
            if (r.ok) {
                const data = await r.json();
                handlePayload(data);
            }
        } catch (e) {}
    }
    setInterval(poll, 1000);

    // Auto-start on load
    async function init() {
        try {
            await fetch('/api/autostart', {
                method: 'POST'
            });
            poll();
        } catch (e) {
            poll();
        }
    }
    init();
    </script>
</body>
</html>
